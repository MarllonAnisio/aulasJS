<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../src/assets/css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador De Senhas</title>
</head>
<body>

    <section class="conteiner">
        <h1>Gerador De Senha</h1>

        <div class="senha-gerada"></div>

        <br>
        quantidade de caracteres <input type="number" class="qtd-caracteres" min="6" max="50"><br>
        Adicionar Maiusculas <input type="checkbox" class="chk-maiusculas" ><br>
        Adicionar Minuscula <input type="checkbox" class="chk-minusculas" checked><br>
        Adicionar numeros <input type="checkbox" class="chk-numeros" checked><br>
        adicionar Simbolos <input type="checkbox" class="chk-simbolos"><br>

        <button class="gerar-senha">Gerar Senha</button>
    </section>

    <script src="./assets/js/bundle.js"></script>
</body>
</html>
